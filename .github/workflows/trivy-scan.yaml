name: Trivy Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy scan and generate SARIF report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "MEDIUM,HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy.sarif"

      - name: Run Trivy scan and generate txt report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "MEDIUM,HIGH,CRITICAL"
          exit-code: "1"
          format: "table"
          output: "trivy.txt"
          skip-setup-trivy: true

      - name: Upload Trivy txt file as artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: trivy.txt
          archive: false
          retention-days: 7

      - name: Upload Trivy SARIF file for GitHub Advanced Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy.sarif
        continue-on-error: true
