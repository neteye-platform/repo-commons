name: Build Docker Image

on:
  workflow_call:
    inputs:
      working-directory:
        description: "The working directory to run the workflow in. E.g. `.`."
        required: true
        type: string
      dockerfile-path:
        description: "The path to the Dockerfile to build. E.g. `./Dockerfile`."
        required: true
        type: string
      image-name:
        description: "The name of the image to build. E.g. `my-image`"
        required: true
        type: string
      push:
        description: "Whether to push the built image to the registry."
        required: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: type=semver,pattern={{version}}

      - name: Build image
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.dockerfile-path }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=${{ runner.temp }}/image.tar

      - name: Build and push image
        if: ${{ inputs.push }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.working-directory }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Upload image
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ inputs.image-name }}-image"
          path: ${{ runner.temp }}/image.tar
          retention-days: 1
