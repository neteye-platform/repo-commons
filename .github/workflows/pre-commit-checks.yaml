# NOTE: This workflow runs pre-commit checks with prek in workspace mode.
# When prek will introduce a way to import pre-commit configurations from other repositories (https://github.com/j178/prek/issues/1238)
# we can centralize all pre-commit checks in the repo-commons repository and reference the configuration file from there.

name: Pre-commit Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  pre-commit-checks:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run common pre-commit checks
        uses: j178/prek-action@5337cb91e0fa35a7ff31b9ca345126d8bbbcdf16 # v2.0.6
        with:
          extra-args: "--all-files --refresh"
