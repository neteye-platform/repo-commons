name: Semgrep Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep-scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep scan and generate reports
        run: |
          # shellcheck disable=SC2046
          semgrep scan \
            --config auto \
            --error \
            --text-output=semgrep.txt \
            --sarif-output=semgrep.sarif \
            $([ -f .semgrepignorerule ] && sed 's/^/--exclude-rule /' .semgrepignorerule)

      - name: Upload Semgrep txt file as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: semgrep.txt
          archive: false
          retention-days: 7

      - name: Upload Semgrep SARIF file for GitHub Advanced Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
