name: Semgrep Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep-scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.166.0@sha256:c180f0c93a17b420c0af5006214a29d3c747c5459c732b740191adf657dd0068
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep scan and generate reports
        run: |
          # shellcheck disable=SC2046
          semgrep scan \
            --config auto \
            --error \
            --text-output=semgrep.txt \
            --sarif-output=semgrep.sarif \
            $([ -f .semgrepignorerule ] && sed 's/^/--exclude-rule /' .semgrepignorerule)

      - name: Upload Semgrep txt file as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: semgrep.txt
          archive: false
          retention-days: 7

      - name: Upload Semgrep SARIF file for GitHub Advanced Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
