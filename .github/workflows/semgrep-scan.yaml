name: Semgrep Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep-scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.162.0@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep scan and generate reports
        run: |
          # shellcheck disable=SC2046
          semgrep scan \
            --config auto \
            --error \
            --text-output=semgrep.txt \
            --sarif-output=semgrep.sarif \
            $([ -f .semgrepignorerule ] && sed 's/^/--exclude-rule /' .semgrepignorerule)

      - name: Upload Semgrep txt file as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: semgrep.txt
          archive: false
          retention-days: 7

      - name: Upload Semgrep SARIF file for GitHub Advanced Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
