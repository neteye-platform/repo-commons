name: Template Sync

on:
  workflow_call:
    inputs:
      template_repo:
        description: "The template repository to sync with. Format: owner/repo"
        required: true
        type: string

permissions:
  contents: read

jobs:
  template-sync:
    name: Template Sync
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ vars.NETEYE_APP_ID }}
          private-key: ${{ secrets.NETEYE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # HACK: Find a better way to sync the template without losing customizations.
      - name: actions-template-sync
        uses: AndreasAugustin/actions-template-sync@8ec19a5f2721ffb81ff809aa340ddf75e6a85ea6 # v2.5.2
        with:
          source_repo_path: ${{ inputs.template_repo }}
          git_remote_pull_params: --allow-unrelated-histories --squash --strategy=recursive --no-tags --strategy-option theirs
          steps: "prechecks,pull" # Stop before committing since this action does not sign commits using the GitHub App token

      - name: Checkout main branch to ensure the PR is created against the correct base branch
        run: git checkout main

      - name: Create or update PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: automatic-template-sync
          title: "chore(template): sync with template repository"
          commit-message: "chore(template): sync with template repository"
          body: |
            This PR updates the repository to the latest version of the template:

            `${{ inputs.template_repo }}`

            The update is generated automatically by the template sync workflow.

            Please review the changes before merging to ensure repository-specific customizations are preserved.
          sign-commits: true
          delete-branch: true
