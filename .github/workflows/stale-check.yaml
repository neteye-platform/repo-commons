name: Stale Check

on:
  workflow_call:

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  stale-check:
    name: Stale Check
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        if: github.repository_owner == 'neteye-platform'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ vars.NETEYE_APP_ID }}
          private-key: ${{ secrets.NETEYE_APP_PRIVATE_KEY }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Mark stale issues and pull requests
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        env:
          DAYS_BEFORE_STALE: 30
          DAYS_BEFORE_CLOSE: 7
        with:
          repo-token: ${{ steps.generate-token.outputs.token || github.token }}
          days-before-stale: ${{ env.DAYS_BEFORE_STALE }}
          days-before-close: ${{ env.DAYS_BEFORE_CLOSE }}
          exempt-issue-labels: "no-stale"
          exempt-pr-labels: "no-stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs within ${{ env.DAYS_BEFORE_CLOSE }} days.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs within ${{ env.DAYS_BEFORE_CLOSE }} days.
          close-issue-message: >
            This issue has been automatically closed because it has not had recent activity.
            If you think this issue should remain open, please comment on it.
          close-pr-message: >
            This pull request has been automatically closed because it has not had recent activity.
            If you think this pull request should remain open, please comment on it.
          delete-branch: true
